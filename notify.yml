# .github/workflows/notify.yml
#
# GitHub Actions workflow for the Electricity Price Notifier
#
# Two scheduled jobs:
#
#   1. evening-summary — runs at 21:00 CET (20:00 UTC) every day
#      - Fetches tomorrow's electricity prices
#      - Saves cheapest hours to schedule.json
#      - Commits schedule.json to the repo
#      - Sends evening summary push notification
#
#   2. hourly-check — runs every hour at :30 UTC (= :30 CET winter)
#      - Reads schedule.json
#      - Sends 30-minute warning if a cheap window starts in 30 min
#      - No price calculations — just reads the saved schedule
#
# Why commit schedule.json?
#   GitHub Actions jobs are isolated — they each get a fresh copy of the repo.
#   The only way for evening-summary to pass data to a later hourly-check job
#   is to commit it to the repo. The hourly-check then checks out the repo
#   and reads the file directly.
 
name: Electricity Price Notifier
 
on:
  schedule:
    # Evening summary — 21:00 CET = 20:00 UTC
    - cron: "0 20 * * *"
 
    # Hourly check — every hour at :30 UTC (= :30 CET in winter)
    # Cron runs at 11:30 UTC → code reads now_cet (12:30) + 30 min = 13:00 CET
    - cron: "30 * * * *"
 
  workflow_dispatch:
    inputs:
      mode:
        description: "Which mode to run"
        required: true
        default: "check"
        type: choice
        options:
          - evening
          - check
 
jobs:
  # ── Evening Summary ──────────────────────────────────────────────────────────
  evening-summary:
    name: Send Evening Summary
    runs-on: ubuntu-latest
 
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '0 20 * * *') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'evening')
 
    permissions:
      contents: write  # Required to commit schedule.json back to the repo
 
    env:
      NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
      ZONE: SE3
 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
 
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
 
      - name: Install dependencies
        run: pip install -r requirements.txt
 
      - name: Run evening summary and save schedule
        run: python main.py --mode evening
 
      - name: Commit schedule.json to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add schedule.json
          git diff --cached --quiet || git commit -m "Update schedule.json for $(date '+%Y-%m-%d')"
          git push
 
  # ── Hourly Check ─────────────────────────────────────────────────────────────
  hourly-check:
    name: Check for Upcoming Cheap Window
    runs-on: ubuntu-latest
 
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '30 * * * *') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'check')
 
    env:
      NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
      ZONE: SE3
 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
 
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
 
      - name: Install dependencies
        run: pip install -r requirements.txt
 
      - name: Check schedule and send alert if needed
        run: python main.py --mode check
 
